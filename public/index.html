<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT-Simulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="toolbar">
        <div class="toolbar-section">
            <button id="btn-download" class="toolbar-btn" title="Scarica rete come JSON">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Scarica JSON</span>
            </button>
            <button id="btn-import" class="toolbar-btn" title="Importa rete da JSON">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>Importa</span>
            </button>
            <button id="btn-new" class="toolbar-btn" title="Crea nuova rete">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                <span>Nuova rete</span>
            </button>
        </div>
        <div class="toolbar-section">
            <button id="btn-ping" class="toolbar-btn" title="Invia pacchetto ICMP (clicca poi seleziona 2 dispositivi)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="22" y1="12" x2="18" y2="12"></line>
                    <line x1="6" y1="12" x2="2" y2="12"></line>
                    <line x1="12" y1="6" x2="12" y2="2"></line>
                    <line x1="12" y1="22" x2="12" y2="18"></line>
                </svg>
                <span>Ping</span>
            </button>
            <button id="btn-debug" class="toolbar-btn" title="Toggle notifiche debug">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span>Debug</span>
            </button>
            <span id="selection-info" class="selection-info">0 dispositivi selezionati</span>
        </div>
        <input type="file" id="file-input" accept=".json" style="display: none;">
    </header>
    
    <div id="app">
        <aside id="palette"></aside>
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>
    
    <!-- Custom Modal for Delete Confirmation -->
    <div id="delete-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Confirm Deletion</h3>
            <p id="delete-modal-message">Are you sure you want to delete this item?</p>
            <div class="modal-buttons">
                <button id="delete-confirm" class="btn btn-danger">Delete</button>
                <button id="delete-cancel" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/app.js" type="module"></script>
</body>
</html>
